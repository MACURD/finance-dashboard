name: API 连通性测试
on: workflow_dispatch

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 测试东方财富 K-line API
        run: |
          echo "=== 东方财富 K-line ==="
          for code in "1.601166" "1.600406" "1.600900" "1.601985" "1.600089"; do
            DATA=$(curl -s --max-time 15 "https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${code}&fields1=f1,f2,f3&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=60")
            COUNT=$(echo "$DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('data',{}).get('klines',[])))" 2>/dev/null || echo "FAIL")
            echo "  $code: $COUNT 条K线"
          done
      - name: 测试新浪 K-line API
        run: |
          echo "=== 新浪 K-line ==="
          for sym in "sh601166" "sh600406" "sh600900" "sh601985" "sh600089"; do
            DATA=$(curl -s --max-time 15 "https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=${sym}&scale=240&ma=no&datalen=60")
            COUNT=$(echo "$DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "FAIL")
            echo "  $sym: $COUNT 条K线"
          done
